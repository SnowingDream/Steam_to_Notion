name: Steam to Notion Sync

on:
  schedule:
    # GitHub cron uses UTC. 20:00 UTC is 04:00 next day in UTC+8 Beijing time.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: steam-to-notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        run: python main.py
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID64: ${{ secrets.STEAM_ID64 }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_GAME_DATA_SOURCE_ID: ${{ secrets.NOTION_GAME_DATA_SOURCE_ID }}
          NOTION_PLAYTIME_DATA_SOURCE_ID: ${{ secrets.NOTION_PLAYTIME_DATA_SOURCE_ID }}
          NOTION_PERIOD_DATA_SOURCE_ID: ${{ secrets.NOTION_PERIOD_DATA_SOURCE_ID }}
          NOTION_SUMMARY_DATA_SOURCE_ID: ${{ secrets.NOTION_SUMMARY_DATA_SOURCE_ID }}
          NOTION_SYNC_LOG_DATA_SOURCE_ID: ${{ secrets.NOTION_SYNC_LOG_DATA_SOURCE_ID }}
          NOTION_VERSION: "2025-09-03"
          STEAM_ACHIEVEMENT_MAX_WORKERS: "5"
          STEAM_ACHIEVEMENT_REQUEST_INTERVAL_SECONDS: "0.2"
